name: Upload DataGen ETL Script to S3

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - etl.py

env:
  AWS_REGION: us-east-1
  S3_BUCKET: eudalia-production-datagen-us-east-1

permissions:
  id-token: write
  contents: read

jobs:
  upload-scripts:
    name: Upload script to S3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-s3-upload-${{ github.run_id }}

      - name: Upload script to S3
        shell: bash
        run: |
          set -euo pipefail

          aws s3 cp etl.py "s3://${S3_BUCKET}/scripts/etl.py"
          echo "Uploaded etl.py to s3://${S3_BUCKET}/scripts/etl.py"
